version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: jcp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jcp_db
    ports:
      - "5432:5432"
    volumes:
      - jcp_postgres_data:/var/lib/postgresql/data

volumes:
  jcp_postgres_data:
